# Full-module scan for CreditAccess Grameen — passive OSINT across every
# module that can run without privileged credentials.
brand:
  name: "CreditAccess Grameen"
  legal_name: "CreditAccess Grameen Limited"
  industry: "NBFC / Microfinance"
  headquarters: "Bengaluru, India"
  founded: 1991
  description: "Listed Indian NBFC-MFI (formerly Grameen Koota Financial Services)."

assets:
  primary_domains:
    - creditaccessgrameen.in
  secondary_domains:
    - cagrameen.in
    - grameenkoota.org
  ip_ranges: []
  mobile_apps:
    android:
      - com.cag.kgfsl
    ios: []
  brand_keywords:
    - "CreditAccess"
    - "Grameen Koota"
    - "CAGrameen"
    - "CA Grameen"
  trademarks:
    - "CreditAccess Grameen"
    - "Grameen Koota"
  product_names:
    - "Group Loan"
    - "Retail Finance"
  social_handles:
    twitter: ["CAGrameen"]
    instagram: ["creditaccessgrameen"]
    facebook: ["CreditAccessGrameen"]
    linkedin: ["creditaccess-grameen-limited"]
    youtube: ["CreditAccessGrameen", "grameenkootajagruti"]
    tiktok: []
    telegram: []

people:
  executives:
    - name: "Udaya Kumar Hebbar"
      title: "MD & CEO"
      email: "investor.relations@creditaccessgrameen.in"
  vips: []
  support_handles:
    - "info@creditaccessgrameen.in"

engagement:
  client_name: "CreditAccess Grameen — Continuous Monitoring"
  engagement_id: "BM-FULL-CAG-001"
  start_date: "2026-05-04"
  end_date: "2026-05-04"
  methodology: "passive OSINT, multi-module"
  authorized_by: "Internal evaluation"
  authorization_ref: "EVAL-2026-002"
  classification: "TLP:AMBER"
  contacts: ["fde@transilienceai.com"]

compliance:
  - ISO27001
  - NIST_CSF
  - RBI_CYBER_RESILIENCE
  - DPDP_ACT
  - GDPR

modules:
  # Domain / DNS / attack-surface
  domain_intel:         { enabled: true, permutations: full, check_live: true, capture_screenshots: false, max_permutations: 600, max_enrich: 15, dns_concurrency: 48, timeout: 240 }
  phishing_intel:       { enabled: true, sources: [urlscan, virustotal, ipqs, phishtank, openphish, urlhaus, threatfox], timeout: 600 }
  asset_discovery:      { enabled: true, timeout: 300, max_subdomains: 500 }
  subdomain_takeover:   { enabled: true, timeout: 240 }
  cloud_exposure:       { enabled: true, timeout: 180 }
  supply_chain:         { enabled: true, timeout: 240 }
  pentest_recon:        { enabled: true, timeout: 240, deep_cve_lookup: true }   # passive TLS / header checks only

  # Infra (passive third-party DB lookups only — no active probing)
  infra_intel:          { enabled: true, sources: [shodan, abuseipdb, otx, netlas, dnsdumpster], cve_min_cvss: 7.0, timeout: 360 }

  # Social
  social_impersonation: { enabled: true, use_sherlock: false, use_maigret: false, apify_scrape: true }
  social_deep_scrape:   { enabled: true, timeout: 600 }
  cross_platform_finder: { enabled: true, timeout: 300 }
  ads_intel:            { enabled: true, timeout: 300 }
  marketplace_intel:    { enabled: true, timeout: 300 }
  news_intel:           { enabled: true, timeout: 240 }

  # Telegram / WhatsApp deep
  telegram_intel:       { enabled: true, timeout: 600, max_channels: 25, scrape_concurrency: 6 }
  whatsapp_intel:       { enabled: true, timeout: 240 }

  # Leak / breach / dark-web
  email_exposure:       { enabled: true, use_hibp: true, use_holehe: false }
  document_leaks:       { enabled: true, timeout: 600, max_queries: 50, use_intelx: true }
  darkweb_intel:        { enabled: true, sources: [intelx, ransomware_live] }
  paste_intel:          { enabled: true, timeout: 240 }
  forum_intel:          { enabled: true, timeout: 240 }
  iab_intel:            { enabled: true, timeout: 240 }
  stealer_logs:         { enabled: true, timeout: 240 }

  # Mobile / counterfeit / misc
  mobile_apps:          { enabled: true, stores: [google_play, apple_app_store, apkpure] }
  content_abuse:        { enabled: true, timeout: 240 }
  ad_fraud:             { enabled: true, timeout: 240 }
  deepfake_intel:       { enabled: false }   # needs per-asset image samples

  # code_leaks needs GITHUB_TOKEN — disabled until a token is added
  code_leaks:           { enabled: false }

apify:
  max_usd_per_scan: 10.0   # generous cap for one-time full scan

screenshots:
  enabled: true
  max_count: 50
  concurrency: 4

ai_triage:
  enabled: true
  model: claude-opus-4-7
  batch_size: 20
  max_findings: 300
  concurrency: 3

report:
  generate_executive: true
  generate_technical: true
  include_appendix_raw: true
  preparer: "Transilience AI Threat Intelligence"
