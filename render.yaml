services:
  - type: web
    name: tai-aegis-api
    env: python
    region: oregon
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: HIBP_API_KEY
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: URLSCAN_API_KEY
        sync: false
      - key: GITHUB_PAT
        sync: false
      - key: GREYNOISE_API_KEY
        sync: false
      - key: SHODAN_API_KEY
        sync: false
      - key: OTX_API_KEY
        sync: false
      - key: INTELX_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: FRONTEND_URL
        sync: false
