services:
  - type: web
    name: tai-aegis-api
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: HIBP_API_KEY
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: URLSCAN_API_KEY
        sync: false
      - key: GITHUB_PAT
        sync: false
      - key: GREYNOISE_API_KEY
        sync: false
      - key: SHODAN_API_KEY
        sync: false
      - key: OTX_API_KEY
        sync: false
      - key: INTELX_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_POLL_INTERVAL_SECONDS
        sync: false
      - key: FRONTEND_URL
        sync: false
      # New providers (set in dashboard or via API)
      - key: ABUSEIPDB_API_KEY
        sync: false
      - key: IPQS_API_KEY
        sync: false
      - key: NETLAS_API_KEY
        sync: false
      - key: DNSDUMPSTER_API_KEY
        sync: false
      # Upstash Redis (REST)
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: ENRICHMENT_CACHE_TTL
        sync: false
      # theHarvester
      - key: HARVESTER_BIN
        sync: false
      - key: HARVESTER_TIMEOUT_SECONDS
        sync: false
      # Maltego TRX shared secret (optional)
      - key: MALTEGO_TRX_AUTH_TOKEN
        sync: false
